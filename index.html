    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <!-- Base Styles -->
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        height: 100%;
        min-height: 100vh;
      }
      
      /* Loader styles for initial load */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fff7ed 0%, #ffffff 50%, #fffbeb 100%);
        z-index: 9999;
      }
      
      .initial-loader .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #fed7aa;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .initial-loader .text {
        margin-top: 16px;
        font-size: 18px;
        font-weight: 600;
        color: #f97316;
      }
      
      .initial-loader .subtext {
        margin-top: 4px;
        font-size: 12px;
        color: #9ca3af;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      /* Hide loader when app loads */
      .loaded .initial-loader {
        display: none;
      }
    </style>
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Makan No. 01, Ward No. 42, Post–New Yard, Sai Nagar",
          "addressLocality": "Meharagaon, Hoshangabad",
          "addressRegion": "Madhya Pradesh",
          "postalCode": "461115",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "22.7543889",
          "longitude": "77.6556563"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "09:00",
            "closes": "20:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Sunday",
            "opens": "10:00",
            "closes": "18:00"
          }
        ],
        "priceRange": "₹₹",
        "paymentAccepted": ["Cash", "Credit Card", "Debit Card", "UPI"],
        "currenciesAccepted": "INR",
        "areaServed": {
          "@type": "State",
          "name": "Madhya Pradesh"
        },
        "founder": {
          "@type": "Person",
          "name": "Mayank Choudhary"
        },
        "sameAs": [
          "https://www.facebook.com/uweservice",
          "https://www.instagram.com/uweservice",
          "https://twitter.com/uweservice"
        ]
      }
    </script>
  </head>

  <body>
    <!-- Initial Loader (shows while React loads) -->
    <div class="initial-loader" id="initial-loader">
      <div class="spinner"></div>
      <div class="text">UWe Service</div>
      <div class="subtext">Loading...</div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loader when app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
